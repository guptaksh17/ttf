services:
  - type: web
    name: taptoturf-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/renderMain.js
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: taptoturf-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: taptoturf-redis
          property: connectionString
      - key: FRONTEND_URL
        value: http://localhost:5173  # PLACEHOLDER: update with Cloudflare Pages URL once deployed
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_TRIGGER_SECRET
        generateValue: true

  - type: keyvalue
    name: taptoturf-redis
    plan: free
    ipAllowList: []   # required field for Key Value instances; empty list blocks all external access, which is correct since only the web service needs internal access

databases:
  - name: taptoturf-db
    plan: free
