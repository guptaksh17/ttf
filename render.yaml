services:
  - type: web
    name: taptoturf-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/renderMain.js
    preDeployCommand: node dbMigrate.js
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: taptoturf-db
          property: connectionString
      - key: REDIS_URL
        fromKeyValue:
          name: taptoturf-redis
          property: connectionString
      - key: FRONTEND_URL
        value: http://localhost:5173  # PLACEHOLDER: Update with Cloudflare Pages frontend URL once deployed
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: taptoturf-db
    plan: free

keyvalues:
  - name: taptoturf-redis
    plan: free
